services:
  cpacodexkeeper:
    build: .
    container_name: cpacodexkeeper
    restart: unless-stopped
    volumes:
      - ./runtime:/app/runtime
    environment:
      CPA_ENDPOINT: ${CPA_ENDPOINT}
      CPA_TOKEN: ${CPA_TOKEN}
      CPA_PROXY: ${CPA_PROXY:-}
      CPA_INTERVAL: ${CPA_INTERVAL:-1800}
      CPA_QUOTA_THRESHOLD: ${CPA_QUOTA_THRESHOLD:-100}
      CPA_EXPIRY_THRESHOLD_DAYS: ${CPA_EXPIRY_THRESHOLD_DAYS:-3}
      CPA_ENABLE_REFRESH: ${CPA_ENABLE_REFRESH:-true}
      CPA_HTTP_TIMEOUT: ${CPA_HTTP_TIMEOUT:-30}
      CPA_USAGE_TIMEOUT: ${CPA_USAGE_TIMEOUT:-15}
      CPA_MAX_RETRIES: ${CPA_MAX_RETRIES:-2}
      CPA_WORKER_THREADS: ${CPA_WORKER_THREADS:-8}
      CPA_SERVER_NAME: ${CPA_SERVER_NAME:-cpacodexkeeper}
      CPA_STATUS_BROADCAST_ENABLED: ${CPA_STATUS_BROADCAST_ENABLED:-true}
      CPA_STATUS_BROADCAST_HOURS_LOCAL: ${CPA_STATUS_BROADCAST_HOURS_LOCAL:-8,12,18,23}
      CPA_STATUS_BROADCAST_TIMEZONE: ${CPA_STATUS_BROADCAST_TIMEZONE:-Asia/Hong_Kong}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      FEISHU_SECURITY_MODE: ${FEISHU_SECURITY_MODE:-none}
      FEISHU_KEYWORD: ${FEISHU_KEYWORD:-}
      FEISHU_SECRET: ${FEISHU_SECRET:-}
      FEISHU_NOTIFY_COOLDOWN_MINUTES: ${FEISHU_NOTIFY_COOLDOWN_MINUTES:-60}
      FEISHU_NOTIFY_SEND_RECOVERY: ${FEISHU_NOTIFY_SEND_RECOVERY:-true}
      FEISHU_NOTIFY_SEND_DAILY_SUMMARY: ${FEISHU_NOTIFY_SEND_DAILY_SUMMARY:-true}
      FEISHU_NOTIFY_DAILY_SUMMARY_HOURS_UTC: ${FEISHU_NOTIFY_DAILY_SUMMARY_HOURS_UTC:-0,3,6,9,12,15}
      FEISHU_NOTIFY_FAILURE_THRESHOLD: ${FEISHU_NOTIFY_FAILURE_THRESHOLD:-3}
      FEISHU_NOTIFY_LARGE_SCALE_USAGE_FAILURE_THRESHOLD: ${FEISHU_NOTIFY_LARGE_SCALE_USAGE_FAILURE_THRESHOLD:-5}
      FEISHU_NOTIFY_STATE_FILE: ${FEISHU_NOTIFY_STATE_FILE:-./runtime/notify_state.json}
      CPA_QUOTA_REPORT_ENABLED: ${CPA_QUOTA_REPORT_ENABLED:-true}
      CPA_QUOTA_ALERT_ENABLED: ${CPA_QUOTA_ALERT_ENABLED:-true}
      CPA_QUOTA_SUMMARY_ENABLED: ${CPA_QUOTA_SUMMARY_ENABLED:-true}
      CPA_QUOTA_PLUS_EFFECTIVE_USABLE_LT: ${CPA_QUOTA_PLUS_EFFECTIVE_USABLE_LT:-10}
      CPA_QUOTA_PLUS_AVG_REMAINING_5H_PERCENT_LT: ${CPA_QUOTA_PLUS_AVG_REMAINING_5H_PERCENT_LT:-30}
      CPA_QUOTA_PLUS_AVG_REMAINING_7D_PERCENT_LT: ${CPA_QUOTA_PLUS_AVG_REMAINING_7D_PERCENT_LT:-30}
      CPA_QUOTA_SUMMARY_HOUR_LOCAL: ${CPA_QUOTA_SUMMARY_HOUR_LOCAL:-8}
      CPA_QUOTA_TIMEZONE: ${CPA_QUOTA_TIMEZONE:-Asia/Hong_Kong}
      CPA_QUOTA_STATE_FILE: ${CPA_QUOTA_STATE_FILE:-./runtime/quota_healthcheck_state.json}
